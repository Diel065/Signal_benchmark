name: mls-benchmark

x-worker-common: &worker-common
  image: mls-app
  entrypoint: ["/usr/local/bin/worker-entrypoint.sh"]
  environment:
    MODE: worker
    DS_URL: http://ds:3000
    RELAY_URL: http://relay:4000
    OPENMLS_PROFILE_RUN_ID: compose-100
    OPENMLS_PROFILE_SCENARIO: http-staircase-compose
  depends_on:
    - ds
    - relay
  volumes:
    - ./benchmark_output:/results

services:
  ds:
    image: mls-ds
    command: ["ds", "--listen-addr", "0.0.0.0:3000"]
    ports:
      - "3000:3000"
    volumes:
      - ./benchmark_output:/results

  relay:
    image: mls-relay
    command: ["message_relay", "--listen-addr", "0.0.0.0:4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./benchmark_output:/results

  worker-00001:
    <<: *worker-common
    environment:
      MODE: worker
      WORKER_NAME: "00001"
      DS_URL: http://ds:3000
      RELAY_URL: http://relay:4000
      LISTEN_ADDR: 0.0.0.0:8080
      OPENMLS_PROFILE_RUN_ID: compose-100
      OPENMLS_PROFILE_SCENARIO: http-staircase-compose
      OPENMLS_PROFILE_PATH: /results/compose-100/client-00001.jsonl
    ports:
      - "8081:8080"

  worker-00002:
    <<: *worker-common
    environment:
      MODE: worker
      WORKER_NAME: "00002"
      DS_URL: http://ds:3000
