name: signal-benchmark

x-worker-common: &worker-common
  image: signal-app
  entrypoint: ["/usr/local/bin/worker-entrypoint.sh"]
  environment:
    MODE: worker
    KEY_REPOSITORY_URL: http://key-repository:3000
    RELAY_URL: http://relay:4000
    SIGNAL_PROFILE_RUN_ID: ${RUN_ID:-compose-smoke-001}
    SIGNAL_PROFILE_SCENARIO: ${SCENARIO:-http-staircase-compose}
  depends_on:
    - key-repository
    - relay
  volumes:
    - ./benchmark_output:/results

services:
  key-repository:
    image: signal-key-repository
    command: ["key_repository", "--listen-addr", "0.0.0.0:3000"]
    ports:
      - "3000:3000"
    volumes:
      - ./benchmark_output:/results

  relay:
    image: signal-relay
    command: ["message_relay", "--listen-addr", "0.0.0.0:4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./benchmark_output:/results

  worker-00001:
    <<: *worker-common
    environment:
      MODE: worker
      WORKER_NAME: "00001"
      KEY_REPOSITORY_URL: http://key-repository:3000
      RELAY_URL: http://relay:4000
      LISTEN_ADDR: 0.0.0.0:8080
      SIGNAL_PROFILE_RUN_ID: ${RUN_ID:-compose-smoke-001}
      SIGNAL_PROFILE_SCENARIO: ${SCENARIO:-http-staircase-compose}
      SIGNAL_PROFILE_PATH: /results/${RUN_ID:-compose-smoke-001}/client-00001.jsonl
    ports:
      - "8081:8080"

  worker-00002:
